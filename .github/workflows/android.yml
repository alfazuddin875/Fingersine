name: Android APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # রানার পরিবর্তন করে windows-latest করা হলো
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Missing Environment Files
      # উইন্ডোজ কমান্ড প্রম্পট অনুযায়ী ফাইল তৈরি করা হচ্ছে
      run: |
        echo API_KEY=dummy_value > .env.example
        echo API_KEY=dummy_value > .env

    - name: Generate Gradle Wrapper (If Missing)
      # উইন্ডোজে gradlew.bat জেনারেট করা হচ্ছে
      run: |
        if (not (Test-Path "gradlew.bat")) {
            gradle wrapper --gradle-version 8.2
        }
      shell: pwsh

    - name: Build Debug APK
      # উইন্ডোজে সরাসরি gradlew.bat রান করা হচ্ছে
      run: .\gradlew.bat assembleDebug
      
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Gesture-App-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
