name: Android APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configure Gradle Memory and Cache
      # জাভার মেমোরি ও ক্যাশ এরর দূর করার জন্য এই কনফিগারেশন যোগ করা হয়েছে
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
        echo "org.gradle.configuration-cache=false" >> ~/.gradle/gradle.properties

    - name: Create Missing Environment Files
      run: |
        touch .env.example
        touch .env
        echo "API_KEY=dummy_value" > .env.example
        echo "API_KEY=dummy_value" > .env

    - name: Generate Gradle Wrapper (If Missing)
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.2
        fi
        chmod +x gradlew

    - name: Build Debug APK with Daemon Disabled
      # --no-daemon দিলে মেমোরি শেয়ারিং এররগুলো আর আসে না
      run: ./gradlew assembleDebug --no-daemon
      
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Gesture-App-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
