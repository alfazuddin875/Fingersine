name: Android APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create Missing Environment Files
      # বিল্ড সফল করতে এখানে ডামি .env এবং .env.example ফাইল তৈরি করা হচ্ছে
      run: |
        touch .env.example
        touch .env
        echo "API_KEY=dummy_value" > .env.example
        echo "API_KEY=dummy_value" > .env

    - name: Generate Gradle Wrapper (If Missing)
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.2
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Gesture-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
