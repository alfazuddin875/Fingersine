name: Android APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Missing Environment Files
      run: |
        echo API_KEY=dummy_value > .env.example
        echo API_KEY=dummy_value > .env

    - name: Generate Gradle Wrapper (If Missing)
      # এখানে 'not' পরিবর্তন করে '!' দেওয়া হয়েছে যা পাওয়ারশেলে সঠিকভাবে কাজ করবে
      run: |
        if (!(Test-Path "gradlew.bat")) {
            gradle wrapper --gradle-version 8.2
        }
      shell: pwsh

    - name: Build Debug APK
      run: .\gradlew.bat assembleDebug
      
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Gesture-App-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
